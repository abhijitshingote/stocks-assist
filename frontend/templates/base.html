<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stocks Assist{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #1c2128;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --accent-yellow: #d29922;
            --accent-purple: #a371f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.4rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent-green);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .dev-indicator {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 0.8em;
        }

        .logo-group {
            display: flex;
            flex-direction: column;
        }

        .data-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #4a5568;
            letter-spacing: 0.5px;
            margin-top: 0.15rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .data-date.loaded {
            opacity: 1;
        }

        .nav-search {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-left: 0.5rem;
        }

        .nav-search input {
            width: 110px;
            padding: 0.3rem 0.5rem;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
        }

        .nav-search input::placeholder {
            text-transform: none;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .nav-search input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            flex: 1;
        }

        .nav-row {
            display: flex;
            gap: 0.6rem;
            justify-content: flex-start;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-links a.nav-highlight {
            color: rgba(195, 9, 46, 1);
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-indicators {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
            flex-shrink: 0;
        }

        .nav-indicator-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.25rem 0.6rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            min-width: 70px;
        }

        .nav-indicator-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-indicator-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .nav-indicator-change {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            font-weight: 500;
        }

        .nav-indicator-change.up { color: var(--accent-green); }
        .nav-indicator-change.down { color: var(--accent-red); }

        @media (max-width: 900px) {
            nav .container {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            
            .nav-search {
                order: 3;
                width: 100%;
                margin-left: 0;
            }
            
            .nav-search input {
                width: 100%;
            }
            
            .nav-links {
                order: 2;
                width: 100%;
            }
            
            .nav-row {
                gap: 0.5rem 1rem;
            }
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s, background 0.2s;
        }

        .card:hover {
            border-color: var(--accent-blue);
            background: var(--bg-card-hover);
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--accent-green);
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            background: #4eca5f;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
        }

        .text-green { color: var(--accent-green); }
        .text-red { color: var(--accent-red); }
        .text-blue { color: var(--accent-blue); }
        .text-yellow { color: var(--accent-yellow); }
        .text-purple { color: var(--accent-purple); }
        .text-muted { color: var(--text-muted); }
        .text-secondary { color: var(--text-secondary); }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Abi Watchlist Button & Modal (shared across screener pages) ── */
        .abi-wl-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            padding: 0.15rem 0.4rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .abi-wl-btn:hover {
            border-color: var(--accent-purple);
            color: var(--text-primary);
        }
        .abi-wl-btn.in-watchlist {
            background: rgba(163, 113, 247, 0.2);
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        .wl-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .wl-modal-overlay.visible { display: flex; }

        .wl-modal {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 420px;
            max-width: 90vw;
            padding: 1.25rem;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .wl-modal-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }
        .wl-modal-title .ticker-hl {
            color: var(--accent-purple);
        }
        .wl-modal textarea {
            width: 100%;
            min-height: 80px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            padding: 0.5rem;
            resize: vertical;
            margin-bottom: 0.75rem;
        }
        .wl-modal textarea:focus { outline: none; border-color: var(--accent-purple); }
        .wl-modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .wl-modal-actions button {
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border-color);
            font-family: 'Outfit', sans-serif;
            transition: all 0.15s;
        }
        .wl-modal-actions .wl-cancel {
            background: var(--bg-dark);
            color: var(--text-secondary);
        }
        .wl-modal-actions .wl-cancel:hover { color: var(--text-primary); }
        .wl-modal-actions .wl-save {
            background: var(--accent-purple);
            color: #fff;
            border-color: var(--accent-purple);
        }
        .wl-modal-actions .wl-save:hover { background: #b585ff; }
        .wl-modal-actions .wl-remove {
            background: transparent;
            color: var(--accent-red);
            border-color: var(--accent-red);
            margin-right: auto;
        }
        .wl-modal-actions .wl-remove:hover { background: rgba(248, 81, 73, 0.15); }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <nav>
        <div class="container">
            <div class="logo-group">
                <a href="/" class="logo">stocks<span>_assist</span>{% if is_dev %} <span class="dev-indicator">(dev)</span>{% endif %}</a>
                <span class="data-date" id="data-date">data thru <span id="latest-date"></span></span>
            </div>
            <div class="nav-search">
                <input type="text" id="navTickerInput" placeholder="Ticker..." maxlength="10" onkeypress="navGoToStock(event)">
            </div>
            <div class="nav-links">
                <div class="nav-row">
                    <a href="/high-sales-growth">High Growth</a>
                    <a href="/volspike-gapper" class="nav-highlight">Vol Spike & Gaps</a>
                    <a href="/top-performance">Top Returns</a>
                    <a href="/rsi">Relative Strength</a>
                    <a href="/rs-screener">RS Screener</a>
                    <a href="/main-view">Main View</a>
                    <a href="/abi-watchlist">Abi Watchlist</a>
                    <a href="/context">Context</a>
                    <a href="/context-2">Context-2</a>
                    <a href="/logs">Logs</a>
                </div>
            </div>
            <div class="nav-indicators">
                <div class="nav-indicator-card" id="vix-card">
                    <span class="nav-indicator-label">VIX</span>
                    <span class="nav-indicator-value" id="vix-value">--</span>
                    <span class="nav-indicator-change" id="vix-change"></span>
                </div>
                <div class="nav-indicator-card" id="us10y-card">
                    <span class="nav-indicator-label">US 10Y</span>
                    <span class="nav-indicator-value" id="us10y-value">--</span>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}

    <script>
        // Fetch and display latest data date
        (function() {
            fetch('/api/frontend/latest-date')
                .then(r => r.json())
                .then(data => {
                    if (data.latest_date) {
                        const d = new Date(data.latest_date + 'T00:00:00');
                        const datePart = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        let label = datePart;
                        if (data.last_update) {
                            const ts = new Date(data.last_update);
                            const timePart = ts.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York' });
                            label = datePart + ', ' + timePart + ' EST';
                        }
                        document.getElementById('latest-date').textContent = label;
                        document.getElementById('data-date').classList.add('loaded');
                    }
                })
                .catch(() => {});
        })();

        // Fetch VIX latest
        fetch('/api/frontend/vix-latest')
            .then(r => r.json())
            .then(data => {
                if (data.close != null) {
                    document.getElementById('vix-value').textContent = data.close.toFixed(2);
                    if (data.change != null) {
                        const el = document.getElementById('vix-change');
                        const sign = data.change >= 0 ? '+' : '';
                        el.textContent = sign + data.change.toFixed(2);
                        el.classList.add(data.change >= 0 ? 'up' : 'down');
                    }
                }
            })
            .catch(() => {});

        // Fetch 10Y Treasury yield
        fetch('/api/frontend/treasury-10y')
            .then(r => r.json())
            .then(data => {
                if (data.yield_pct != null) {
                    document.getElementById('us10y-value').textContent = data.yield_pct.toFixed(2) + '%';
                }
            })
            .catch(() => {});

        // Navbar ticker search
        function navGoToStock(event) {
            if (event.key === 'Enter') {
                const ticker = document.getElementById('navTickerInput').value.trim().toUpperCase();
                if (ticker) {
                    window.location.href = '/stock/' + ticker;
                }
            }
        }
    </script>

    <!-- Abi Watchlist Modal (shared across pages) -->
    <div class="wl-modal-overlay" id="wlModalOverlay">
        <div class="wl-modal">
            <div class="wl-modal-title">Add <span class="ticker-hl" id="wlModalTicker"></span> to Abi Watchlist</div>
            <textarea id="wlModalNotes" placeholder="Notes (optional)..."></textarea>
            <div class="wl-modal-actions">
                <button class="wl-remove" id="wlModalRemoveBtn" style="display:none;" onclick="window._wlRemove()">Remove</button>
                <button class="wl-cancel" onclick="window._wlClose()">Cancel</button>
                <button class="wl-save" id="wlModalSaveBtn" onclick="window._wlSave()">Add</button>
            </div>
        </div>
    </div>
    <script>
    (function(){
        const overlay = document.getElementById('wlModalOverlay');
        const tickerEl = document.getElementById('wlModalTicker');
        const notesEl = document.getElementById('wlModalNotes');
        const removeBtn = document.getElementById('wlModalRemoveBtn');
        const saveBtn = document.getElementById('wlModalSaveBtn');
        let _ticker = null;
        let _isInWl = false;
        let _onDone = null;

        window._wlOpen = function(ticker, currentNotes, inWatchlist, onDone) {
            _ticker = ticker;
            _isInWl = !!inWatchlist;
            _onDone = onDone || null;
            tickerEl.textContent = ticker;
            notesEl.value = currentNotes || '';
            removeBtn.style.display = _isInWl ? 'inline-block' : 'none';
            saveBtn.textContent = _isInWl ? 'Update' : 'Add';
            document.querySelector('.wl-modal-title').innerHTML = (_isInWl ? 'Edit ' : 'Add ') + '<span class="ticker-hl">' + ticker + '</span>' + (_isInWl ? ' Watchlist Notes' : ' to Abi Watchlist');
            overlay.classList.add('visible');
            notesEl.focus();
        };

        window._wlClose = function() {
            overlay.classList.remove('visible');
            _ticker = null;
        };

        window._wlSave = async function() {
            if (!_ticker) return;
            const notes = notesEl.value.trim();
            try {
                if (_isInWl) {
                    await fetch('/api/frontend/abi-watchlist/' + _ticker, {
                        method: 'PUT',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({notes})
                    });
                } else {
                    await fetch('/api/frontend/abi-watchlist', {
                        method: 'POST',
                        headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ticker: _ticker, notes})
                    });
                }
            } catch(e) { console.error('Watchlist save error', e); }
            overlay.classList.remove('visible');
            if (_onDone) _onDone('saved', _ticker, notes);
            _ticker = null;
        };

        window._wlRemove = async function() {
            if (!_ticker) return;
            try {
                await fetch('/api/frontend/abi-watchlist/' + _ticker, {method:'DELETE'});
            } catch(e) { console.error('Watchlist remove error', e); }
            overlay.classList.remove('visible');
            if (_onDone) _onDone('removed', _ticker);
            _ticker = null;
        };

        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) window._wlClose();
        });
    })();
    </script>
</body>
</html>
