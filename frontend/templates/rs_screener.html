{% extends "base.html" %}

{% block title %}RS Screener - Stocks Assist{% endblock %}

{% block extra_styles %}
<style>
    main {
        max-width: 100% !important;
        padding: 0.75rem !important;
    }

    .rs-layout {
        display: flex;
        gap: 0.5rem;
        height: calc(100vh - 80px);
    }

    /* ── Left panel: stock list ── */
    .rs-left {
        width: 220px;
        min-width: 180px;
        display: flex;
        flex-direction: column;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        overflow: hidden;
    }

    .rs-left-header {
        padding: 0.5rem 0.6rem;
        border-bottom: 1px solid var(--border-color);
        font-size: 0.7rem;
        color: var(--text-secondary);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .rs-left-header .stock-count {
        font-family: 'JetBrains Mono', monospace;
        color: var(--accent-green);
    }

    .stock-list {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border-color) transparent;
    }

    .stock-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.35rem 0.6rem;
        cursor: pointer;
        border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        font-size: 0.75rem;
        transition: background 0.15s;
    }

    .stock-item:hover {
        background: var(--bg-card-hover);
    }

    .stock-item.active {
        background: rgba(88, 166, 255, 0.12);
        border-left: 2px solid var(--accent-blue);
    }

    .stock-item .ticker {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 600;
        color: var(--text-primary);
        font-size: 0.75rem;
    }

    .stock-item .score {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.7rem;
        color: var(--text-secondary);
    }

    /* ── Right panel: sliders + chart + info ── */
    .rs-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        min-width: 0;
    }

    /* Slider bar */
    .slider-bar {
        display: flex;
        gap: 1.25rem;
        align-items: center;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.5rem 1rem;
        flex-wrap: wrap;
    }

    .slider-group {
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }

    .slider-group label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.7rem;
        color: var(--text-secondary);
        min-width: 28px;
    }

    .slider-group input[type="range"] {
        width: 80px;
        height: 4px;
        -webkit-appearance: none;
        background: var(--border-color);
        border-radius: 2px;
        outline: none;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent-blue);
        cursor: pointer;
    }

    .slider-group .slider-val {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.65rem;
        color: var(--accent-blue);
        min-width: 20px;
        text-align: right;
    }

    .slider-reset {
        font-size: 0.65rem;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0.2rem 0.4rem;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: transparent;
        transition: color 0.15s, border-color 0.15s;
    }

    .slider-reset:hover {
        color: var(--text-primary);
        border-color: var(--text-secondary);
    }

    /* Chart area */
    .chart-area {
        flex: 1;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.5rem;
        display: flex;
        flex-direction: column;
        min-height: 0;
        position: relative;
        overflow: hidden;
    }

    .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 0.5rem 0.4rem 0.5rem;
    }

    .chart-ticker-info {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
    }

    .chart-ticker-info .ticker-name {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-primary);
    }

    .chart-ticker-info .company-name {
        font-size: 0.75rem;
        color: var(--text-secondary);
    }

    .chart-timeframes {
        display: flex;
        gap: 0.25rem;
    }

    .chart-timeframes button {
        padding: 0.2rem 0.5rem;
        font-size: 0.65rem;
        font-family: 'JetBrains Mono', monospace;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.15s;
    }

    .chart-timeframes button.active {
        background: var(--accent-blue);
        color: #fff;
        border-color: var(--accent-blue);
    }

    .chart-container-wrap {
        /* no flex-grow; height set by JS */
    }

    .subchart-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.6rem;
        color: var(--text-muted);
        padding: 0.15rem 0.5rem 0;
    }

    .chart-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: var(--text-muted);
        font-size: 0.8rem;
    }

    /* Metrics strip above chart */
    .metrics-strip {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.5rem 0.75rem;
        display: none;
        flex-wrap: wrap;
        gap: 0.4rem 0;
    }

    .metrics-strip.visible { display: flex; }

    .ms-section {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.15rem 0.75rem;
        border-right: 1px solid var(--border-color);
    }

    .ms-section:last-child { border-right: none; }

    .ms-section-title {
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
        white-space: nowrap;
    }

    .ms-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 40px;
    }

    .ms-label {
        font-size: 0.65rem;
        color: var(--text-muted);
        line-height: 1.1;
    }

    .ms-val {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.8rem;
        font-weight: 600;
        line-height: 1.3;
    }

    .ms-sub {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.6rem;
        color: var(--text-secondary);
        line-height: 1.1;
    }

    .ms-item .ms-val-truncate {
        max-width: 110px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.7rem;
        font-weight: 400;
    }

    /* Market cap tabs */
    .cap-tabs {
        display: flex;
        gap: 0.25rem;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.35rem 0.5rem;
    }

    .cap-tab {
        padding: 0.3rem 0.75rem;
        font-size: 0.7rem;
        font-family: 'JetBrains Mono', monospace;
        border: 1px solid transparent;
        border-radius: 4px;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.1rem;
    }

    .cap-tab .cap-label {
        font-size: 0.5rem;
        color: var(--text-muted);
    }

    .cap-tab:hover {
        color: var(--text-primary);
        background: var(--bg-card-hover);
    }

    .cap-tab.active {
        color: var(--accent-blue);
        border-color: var(--accent-blue);
        background: rgba(88, 166, 255, 0.1);
    }

    .rs-positive { color: var(--accent-green); }
    .rs-negative { color: var(--accent-red); }

    @media (max-width: 768px) {
        .rs-layout { flex-direction: column; height: auto; }
        .rs-left { width: 100%; height: 200px; }
    }
</style>
{% endblock %}

{% block content %}
<!-- Market Cap Tabs -->
<div class="cap-tabs" style="margin-bottom: 0.5rem;">
    <button class="cap-tab active" data-cap="all">All<span class="cap-label">No Filter</span></button>
    <button class="cap-tab" data-cap="mega">Mega<span class="cap-label">&gt;$100B</span></button>
    <button class="cap-tab" data-cap="large">Large<span class="cap-label">$20B–$100B</span></button>
    <button class="cap-tab" data-cap="mid">Mid<span class="cap-label">$2B–$20B</span></button>
    <button class="cap-tab" data-cap="small">Small<span class="cap-label">$200M–$2B</span></button>
    <button class="cap-tab" data-cap="micro">Micro<span class="cap-label">&lt;$200M</span></button>
</div>

<div class="rs-layout">
    <!-- Left: stock list -->
    <div class="rs-left">
        <div class="rs-left-header">
            <span>RS Score</span>
            <span class="stock-count" id="stockCount">0</span>
        </div>
        <div class="stock-list" id="stockList"></div>
    </div>

    <!-- Right: sliders + chart + info -->
    <div class="rs-right">
        <!-- Sliders -->
        <div class="slider-bar">
            <div class="slider-group">
                <label>2D</label>
                <input type="range" min="0" max="100" value="20" data-tf="2d">
                <span class="slider-val">20</span>
            </div>
            <div class="slider-group">
                <label>5D</label>
                <input type="range" min="0" max="100" value="20" data-tf="5d">
                <span class="slider-val">20</span>
            </div>
            <div class="slider-group">
                <label>10D</label>
                <input type="range" min="0" max="100" value="20" data-tf="10d">
                <span class="slider-val">20</span>
            </div>
            <div class="slider-group">
                <label>20D</label>
                <input type="range" min="0" max="100" value="20" data-tf="20d">
                <span class="slider-val">20</span>
            </div>
            <div class="slider-group">
                <label>60D</label>
                <input type="range" min="0" max="100" value="20" data-tf="60d">
                <span class="slider-val">20</span>
            </div>
            <button class="slider-reset" id="resetSliders">Reset</button>
        </div>

        <!-- Metrics strip (above chart) -->
        <div class="metrics-strip" id="metricsStrip"></div>

        <!-- Chart -->
        <div class="chart-area">
            <div class="chart-header">
                <div class="chart-ticker-info">
                    <span class="ticker-name" id="chartTicker">—</span>
                    <span class="company-name" id="chartCompany"></span>
                </div>
                <div class="chart-timeframes">
                    <button data-days="30">1M</button>
                    <button data-days="90">3M</button>
                    <button data-days="180">6M</button>
                    <button data-days="365" class="active">1Y</button>
                </div>
            </div>
            <div class="subchart-label">SPY</div>
            <div id="spyChartContainer"></div>
            <div id="rsChartContainer"></div>
            <div class="subchart-label">RSI MktCap</div>
            <div id="rsiSubChart"></div>
            <div class="chart-loading" id="chartLoading">Select a stock from the list</div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="/static/js/stock-chart.js"></script>
<script>
(function() {
    // ── State ──
    let allStocks = [];
    let currentCap = 'all';
    let selectedTicker = null;
    let currentTimeframeDays = 365;

    // Ticker chart (StockChart instance — no RSI, we manage RSI ourselves)
    let stockChart = null;

    // SPY subchart (managed here)
    let spyChart = null;
    let spyCandleSeries = null;
    let spyAllData = null;

    // RSI subchart (managed here, not by StockChart)
    let rsiChart = null;
    let rsiSeries = null;

    const TIMEFRAMES = ['2d', '5d', '10d', '20d', '60d'];

    // ── Shared chart options builder ──
    function miniChartOpts(container, height, showTimeAxis) {
        return {
            width: container.clientWidth,
            height: height,
            layout: {
                background: { type: 'solid', color: 'transparent' },
                textColor: CHART_CONFIG.textColor,
                fontFamily: "'JetBrains Mono', monospace",
            },
            grid: {
                vertLines: { color: CHART_CONFIG.gridColor },
                horzLines: { color: CHART_CONFIG.gridColor },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { width: 1, color: CHART_CONFIG.crosshairColor, style: LightweightCharts.LineStyle.Dashed },
                horzLine: { width: 1, color: CHART_CONFIG.crosshairColor, style: LightweightCharts.LineStyle.Dashed },
            },
            rightPriceScale: {
                borderColor: CHART_CONFIG.borderColor,
                scaleMargins: { top: 0.1, bottom: 0.1 },
            },
            timeScale: {
                borderColor: CHART_CONFIG.borderColor,
                visible: !!showTimeAxis,
            },
            handleScroll: false,
            handleScale: false,
        };
    }

    // ── Slider weights ──
    function getWeights() {
        const w = {};
        document.querySelectorAll('.slider-group input[type="range"]').forEach(el => {
            w[el.dataset.tf] = parseInt(el.value, 10);
        });
        return w;
    }

    function computeComposite(stock, weights) {
        const sum = TIMEFRAMES.reduce((s, tf) => s + weights[tf], 0);
        if (sum === 0) return 0;
        let score = 0;
        TIMEFRAMES.forEach(tf => {
            const rank = stock[`rs_${tf}_rank`] || 0;
            score += (weights[tf] / sum) * rank;
        });
        return Math.round(score * 10) / 10;
    }

    // ── Data loading ──
    async function loadData(cap) {
        try {
            const resp = await fetch(`/api/frontend/rs-screener/${cap}`);
            allStocks = await resp.json();
            if (allStocks.error) allStocks = [];
            renderList();
        } catch (e) {
            console.error('Failed to load RS screener data', e);
            allStocks = [];
            renderList();
        }
    }

    // ── Render stock list ──
    function renderList() {
        const weights = getWeights();
        const scored = allStocks.map(s => ({
            ...s,
            composite: computeComposite(s, weights),
        }));
        scored.sort((a, b) => b.composite - a.composite);

        const listEl = document.getElementById('stockList');
        document.getElementById('stockCount').textContent = scored.length;

        listEl.innerHTML = scored.map(s => {
            const isActive = s.ticker === selectedTicker ? ' active' : '';
            return `<div class="stock-item${isActive}" data-ticker="${s.ticker}">
                <span class="ticker">${s.ticker}</span>
                <span class="score">${s.composite.toFixed(1)}</span>
            </div>`;
        }).join('');

        listEl.querySelectorAll('.stock-item').forEach(el => {
            el.addEventListener('click', () => selectStock(el.dataset.ticker));
        });
    }

    // ── SPY subchart ──
    function destroySpyChart() {
        if (spyChart) { spyChart.remove(); spyChart = null; spyCandleSeries = null; }
    }

    async function loadSpyData() {
        if (!spyAllData) {
            try {
                const resp = await fetch('/api/frontend/index-ohlc/SPY');
                spyAllData = await resp.json();
            } catch (e) { console.warn('Could not load SPY data', e); spyAllData = []; }
        }
    }

    function updateSpyChartData() {
        if (!spyCandleSeries || !spyAllData || !Array.isArray(spyAllData)) return;
        const cutoffStr = getCutoffStr();
        const filtered = spyAllData.filter(d => d.time >= cutoffStr).map(d => ({
            time: d.time, open: d.open, high: d.high, low: d.low, close: d.close,
        }));
        spyCandleSeries.setData(filtered);
    }

    // ── RSI subchart ──
    function destroyRsiChart() {
        if (rsiChart) { rsiChart.remove(); rsiChart = null; rsiSeries = null; }
    }

    function updateRsiChartData() {
        if (!rsiSeries || !stockChart || !stockChart.allData) return;
        const cutoffStr = getCutoffStr();
        // Include all dates in the timeframe so the x-axis matches the main chart.
        // Forward-fill null RSI values with the last known value.
        let lastVal = 0;
        const rsiData = stockChart.allData
            .filter(d => d.time >= cutoffStr)
            .map(d => {
                if (d.rsi_mktcap != null) lastVal = d.rsi_mktcap;
                return { time: d.time, value: lastVal };
            });
        rsiSeries.setData(rsiData);
    }

    // ── Helpers ──
    function getCutoffStr() {
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - currentTimeframeDays);
        return cutoff.toISOString().split('T')[0];
    }

    // ── Sync all charts: time scale + crosshair ──
    // Main ticker chart is authoritative for time scale. All others follow.
    function syncAllCharts() {
        if (!stockChart || !stockChart.chart) return;

        const mainChart = stockChart.chart;
        const volChart = stockChart.volumeChart;
        const allExtras = []; // {chart, series} for SPY and RSI
        if (spyChart && spyCandleSeries) allExtras.push({ chart: spyChart, series: spyCandleSeries });
        if (rsiChart && rsiSeries) allExtras.push({ chart: rsiChart, series: rsiSeries });

        // Time scale: main → extras (one-way)
        mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
            if (!range) return;
            allExtras.forEach(e => { try { e.chart.timeScale().setVisibleLogicalRange(range); } catch(_){} });
        });

        // Also volume → extras (the volume chart shows the time axis in StockChart, so it can also drive)
        if (volChart) {
            volChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
                if (!range) return;
                allExtras.forEach(e => { try { e.chart.timeScale().setVisibleLogicalRange(range); } catch(_){} });
            });
        }

        // Crosshair: build a list of all chart+series pairs to keep in sync
        const allCharts = [
            { chart: mainChart, series: stockChart.series.candlestick },
        ];
        if (volChart && stockChart.volumeSeries) allCharts.push({ chart: volChart, series: stockChart.volumeSeries });
        allExtras.forEach(e => allCharts.push(e));

        // For each chart, on crosshair move propagate to all others
        allCharts.forEach(source => {
            source.chart.subscribeCrosshairMove(param => {
                if (!param.time) return;
                allCharts.forEach(target => {
                    if (target.chart !== source.chart) {
                        try { target.chart.setCrosshairPosition(0, param.time, target.series); } catch(_){}
                    }
                });
            });
        });
    }

    // ── Unified setTimeframe ──
    function setAllTimeframes(days) {
        currentTimeframeDays = days;
        // Update data on SPY and RSI first
        updateSpyChartData();
        updateRsiChartData();
        // Then let main chart fitContent (which drives extras via sync)
        if (stockChart) {
            stockChart.setTimeframe(days);
        }
    }

    // ── Resize handler ──
    let extraResizeHandler = null;
    function setupExtraResize() {
        if (extraResizeHandler) window.removeEventListener('resize', extraResizeHandler);
        extraResizeHandler = () => {
            if (spyChart) {
                const c = document.getElementById('spyChartContainer');
                if (c) spyChart.applyOptions({ width: c.clientWidth });
            }
            if (rsiChart) {
                const c = document.getElementById('rsiSubChart');
                if (c) rsiChart.applyOptions({ width: c.clientWidth });
            }
        };
        window.addEventListener('resize', extraResizeHandler);
    }

    // ── Select stock and load chart ──
    async function selectStock(ticker) {
        if (selectedTicker === ticker) return;
        selectedTicker = ticker;

        document.querySelectorAll('.stock-item').forEach(el => {
            el.classList.toggle('active', el.dataset.ticker === ticker);
        });

        const stock = allStocks.find(s => s.ticker === ticker);
        if (!stock) return;

        document.getElementById('chartTicker').textContent = ticker;
        document.getElementById('chartCompany').textContent = stock.company_name || '';
        document.getElementById('chartLoading').style.display = 'flex';

        // Destroy old charts
        if (stockChart) { stockChart.destroy(); stockChart = null; }
        destroySpyChart();
        destroyRsiChart();

        // Clear containers
        document.getElementById('spyChartContainer').innerHTML = '';
        document.getElementById('rsChartContainer').innerHTML = '';
        document.getElementById('rsiSubChart').innerHTML = '';

        // Compute explicit pixel heights for each section.
        // Available height = chart-area height minus header, labels, padding
        const chartArea = document.querySelector('.chart-area');
        const header = document.querySelector('.chart-header');
        const labels = chartArea.querySelectorAll('.subchart-label');
        let usedHeight = header.offsetHeight + 16; // padding
        labels.forEach(l => { usedHeight += l.offsetHeight; });
        const availableHeight = chartArea.clientHeight - usedHeight;

        // Allocate: SPY 12%, RSI 12%, ticker chart gets the rest
        const spyH = Math.max(Math.round(availableHeight * 0.12), 60);
        const rsiH = Math.max(Math.round(availableHeight * 0.12), 60);
        const tickerH = Math.max(availableHeight - spyH - rsiH, 200);

        // Set container heights explicitly
        document.getElementById('spyChartContainer').style.height = spyH + 'px';
        document.getElementById('rsChartContainer').style.height = tickerH + 'px';
        document.getElementById('rsiSubChart').style.height = rsiH + 'px';

        try {
            await loadSpyData();

            // Create SPY subchart with explicit height
            const spyC = document.getElementById('spyChartContainer');
            spyChart = LightweightCharts.createChart(spyC, miniChartOpts(spyC, spyH, false));
            spyCandleSeries = spyChart.addCandlestickSeries({
                upColor: CHART_CONFIG.upColor, downColor: CHART_CONFIG.downColor,
                borderDownColor: CHART_CONFIG.downColor, borderUpColor: CHART_CONFIG.upColor,
                wickDownColor: CHART_CONFIG.downColor, wickUpColor: CHART_CONFIG.upColor,
            });

            // Create ticker chart WITHOUT built-in RSI
            stockChart = new StockChart('rsChartContainer', {
                height: tickerH,
                showRSI: false,
            });
            await stockChart.load(ticker);

            // Create RSI subchart with explicit height
            const rsiC = document.getElementById('rsiSubChart');
            rsiChart = LightweightCharts.createChart(rsiC, miniChartOpts(rsiC, rsiH, false));
            rsiSeries = rsiChart.addAreaSeries({
                lineColor: CHART_CONFIG.rsiColor,
                topColor: 'rgba(0, 188, 212, 0.4)',
                bottomColor: 'rgba(0, 188, 212, 0.05)',
                lineWidth: 2,
                priceLineVisible: false,
                lastValueVisible: true,
                crosshairMarkerVisible: true,
            });

            setupExtraResize();
            syncAllCharts();
            setAllTimeframes(currentTimeframeDays);

            document.getElementById('chartLoading').style.display = 'none';
        } catch (e) {
            console.error('Chart load error', e);
            document.getElementById('chartLoading').textContent = 'Failed to load chart';
        }

        updateMetricsStrip(stock);
    }

    // ── Metrics strip (compact, above chart) ──
    function fmtRet(v) { if (v == null) return '—'; return (v >= 0 ? '+' : '') + v.toFixed(0) + '%'; }
    function retCls(v) { if (v == null) return ''; return v >= 0 ? 'rs-positive' : 'rs-negative'; }
    function fmtVal(v, d) { if (v == null || v <= 0) return '—'; return v.toFixed(d == null ? 1 : d); }
    function fmtVol(v) { if (!v) return '—'; if (v>=1e9) return (v/1e9).toFixed(1)+'B'; if (v>=1e6) return (v/1e6).toFixed(1)+'M'; if (v>=1e3) return (v/1e3).toFixed(0)+'K'; return v.toLocaleString(); }

    function msItem(label, val, cls, sub) {
        return `<span class="ms-item"><span class="ms-label">${label}</span><span class="ms-val ${cls||''}">${val}</span>${sub ? '<span class="ms-sub">'+sub+'</span>':''}</span>`;
    }

    function updateMetricsStrip(rsStock) {
        const strip = document.getElementById('metricsStrip');
        strip.classList.remove('visible');
        strip.innerHTML = '';

        fetch(`/api/frontend/stock/${rsStock.ticker}`).then(r => r.json()).then(s => {
            let html = '';

            // RS values
            html += '<div class="ms-section"><span class="ms-section-title">RS</span>';
            TIMEFRAMES.forEach(tf => {
                const raw = rsStock[`rs_${tf}`];
                const rank = rsStock[`rs_${tf}_rank`];
                const v = raw != null ? (raw>=0?'+':'') + raw.toFixed(1) + '%' : '—';
                html += msItem(tf.toUpperCase(), v, retCls(raw), rank != null ? 'P'+rank : '');
            });
            html += '</div>';

            // Price & Market
            html += '<div class="ms-section"><span class="ms-section-title">Mkt</span>';
            html += msItem('Price', s.current_price ? '$'+s.current_price.toFixed(2) : '—');
            html += msItem('MCap', formatMktCap(s.market_cap));
            html += msItem('Vol', fmtVol(s.volume));
            html += msItem('$Vol', formatMktCap(s.dollar_volume));
            html += '</div>';

            // Technical
            html += '<div class="ms-section"><span class="ms-section-title">Tech</span>';
            html += msItem('RSI', s.rsi_mktcap || '—', s.rsi_mktcap >= 70 ? 'rs-positive' : s.rsi_mktcap <= 30 ? 'rs-negative' : '');
            html += msItem('ATR%', s.atr20 ? s.atr20.toFixed(1)+'%' : '—');
            html += msItem('V/Avg', s.vol_vs_10d_avg ? s.vol_vs_10d_avg.toFixed(1)+'x' : '—');
            html += '</div>';

            // Returns
            html += '<div class="ms-section"><span class="ms-section-title">Ret</span>';
            [['1D','dr_1'],['5D','dr_5'],['20D','dr_20'],['60D','dr_60'],['120D','dr_120']].forEach(([l,k]) => {
                html += msItem(l, fmtRet(s[k]), retCls(s[k]));
            });
            html += '</div>';

            // Revenue Growth
            html += '<div class="ms-section"><span class="ms-section-title">Rev</span>';
            [['T-1','rev_growth_t_minus_1'],['T','rev_growth_t'],['T+1','rev_growth_t_plus_1'],['T+2','rev_growth_t_plus_2']].forEach(([l,k]) => {
                html += msItem(l, fmtRet(s[k]), retCls(s[k]));
            });
            html += '</div>';

            // EPS Growth
            html += '<div class="ms-section"><span class="ms-section-title">EPS</span>';
            [['T-1','eps_growth_t_minus_1'],['T','eps_growth_t'],['T+1','eps_growth_t_plus_1'],['T+2','eps_growth_t_plus_2']].forEach(([l,k]) => {
                html += msItem(l, fmtRet(s[k]), retCls(s[k]));
            });
            html += '</div>';

            // P/S
            html += '<div class="ms-section"><span class="ms-section-title">P/S</span>';
            [['T-1','ps_t_minus_1'],['T','ps_t'],['T+1','ps_t_plus_1'],['T+2','ps_t_plus_2']].forEach(([l,k]) => {
                html += msItem(l, fmtVal(s[k], 1));
            });
            html += '</div>';

            // P/E
            html += '<div class="ms-section"><span class="ms-section-title">P/E</span>';
            [['T-1','pe_t_minus_1'],['T','pe_t'],['T+1','pe_t_plus_1'],['T+2','pe_t_plus_2']].forEach(([l,k]) => {
                html += msItem(l, fmtVal(s[k], 0));
            });
            html += '</div>';

            // Float & Short
            html += '<div class="ms-section"><span class="ms-section-title">Flt</span>';
            html += msItem('Float', fmtVol(s.float_shares));
            html += msItem('Free%', s.free_float ? s.free_float.toFixed(1)+'%' : '—');
            html += msItem('Short%', s.short_float ? s.short_float.toFixed(1)+'%' : '—');
            html += '</div>';

            // Sector/Industry (truncated)
            html += '<div class="ms-section"><span class="ms-section-title">Info</span>';
            html += `<span class="ms-item"><span class="ms-label">Sector</span><span class="ms-val ms-val-truncate" title="${s.sector||''}">${s.sector||'—'}</span></span>`;
            html += `<span class="ms-item"><span class="ms-label">Ind</span><span class="ms-val ms-val-truncate" title="${s.industry||''}">${s.industry||'—'}</span></span>`;
            html += '</div>';

            strip.innerHTML = html;
            strip.classList.add('visible');
        }).catch(() => {});
    }

    function formatMktCap(val) {
        if (!val) return '—';
        if (val >= 1e12) return '$' + (val / 1e12).toFixed(1) + 'T';
        if (val >= 1e9) return '$' + (val / 1e9).toFixed(1) + 'B';
        if (val >= 1e6) return '$' + (val / 1e6).toFixed(0) + 'M';
        return '$' + val.toLocaleString();
    }

    // ── Event wiring ──

    document.querySelectorAll('.slider-group input[type="range"]').forEach(el => {
        el.addEventListener('input', () => {
            el.nextElementSibling.textContent = el.value;
            renderList();
        });
    });

    document.getElementById('resetSliders').addEventListener('click', () => {
        document.querySelectorAll('.slider-group input[type="range"]').forEach(el => {
            el.value = 20;
            el.nextElementSibling.textContent = '20';
        });
        renderList();
    });

    document.querySelectorAll('.cap-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cap-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCap = btn.dataset.cap;
            selectedTicker = null;
            loadData(currentCap);
        });
    });

    document.querySelectorAll('.chart-timeframes button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.chart-timeframes button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setAllTimeframes(parseInt(btn.dataset.days, 10));
        });
    });

    // ── Init ──
    loadData('all');
})();
</script>
{% endblock %}
