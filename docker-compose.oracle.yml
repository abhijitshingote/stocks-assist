# Docker Compose override for Oracle Free Tier (VM.Standard.E2.1.Micro)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.oracle.yml up -d
#
# This override optimizes for 1 OCPU / 1GB RAM environments by:
# - Adding strict memory limits to all services
# - Configuring PostgreSQL for low memory usage
# - Reducing resource consumption across the board

services:
  db:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    environment:
      POSTGRES_DB: stocks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/New_York
      # Low-memory PostgreSQL settings
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "effective_cache_size=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "wal_buffers=4MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "temp_buffers=4MB"
      - "-c"
      - "log_min_duration_statement=1000"
    shm_size: '64mb'

  backend:
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/stocks_db
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - TZ=America/New_York
      # Low-memory mode for Python scripts
      - LOW_MEMORY_MODE=true
      - PYTHONUNBUFFERED=1
      - PYTHONHASHSEED=0

  frontend:
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

  nginx:
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

